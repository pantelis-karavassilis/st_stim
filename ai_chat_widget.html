<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff}
#hp-study-wrap{font-family:Arial,sans-serif;font-size:14px;color:#333;background:#fff;border:1px solid #ccc;max-width:100%}
#hp-study-wrap .hp-top{border-bottom:2px solid #0076d1;padding:14px 20px;font-size:15px;font-weight:bold}
#hp-study-wrap .hp-chat-win{margin:0 20px;border:1px solid #ccc;border-bottom:none;height:440px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
#hp-study-wrap .hp-msg-row{display:flex;flex-direction:column;gap:3px}
#hp-study-wrap .hp-msg-row.user{align-items:flex-end}
#hp-study-wrap .hp-msg-row.ai{align-items:flex-start}
#hp-study-wrap .hp-msg-lbl{font-size:11px;color:#888}
#hp-study-wrap .hp-bubble{max-width:82%;padding:9px 13px;font-size:14px;line-height:1.6;border:1px solid #ccc;background:#fff;color:#333;white-space:pre-wrap}
#hp-study-wrap .hp-msg-row.user .hp-bubble{background:#e8f0fb;border-color:#b3c9ef}
#hp-study-wrap .hp-typing-row{display:none;flex-direction:column;gap:3px}
#hp-study-wrap .hp-typing-row.visible{display:flex}
#hp-study-wrap .hp-typing-dots{border:1px solid #ccc;background:#fff;padding:10px 14px;display:flex;gap:5px;align-items:center;width:fit-content}
#hp-study-wrap .hp-dot{width:6px;height:6px;border-radius:50%;background:#aaa;animation:hpblink 1.2s infinite}
#hp-study-wrap .hp-dot:nth-child(2){animation-delay:.2s}
#hp-study-wrap .hp-dot:nth-child(3){animation-delay:.4s}
@keyframes hpblink{0%,80%,100%{opacity:.3}40%{opacity:1}}
#hp-study-wrap .hp-input-area{padding:12px 20px 16px;margin:0 20px;display:flex;gap:8px;align-items:flex-end;border:1px solid #ccc;border-top:1px solid #e0e0e0}
#hp-study-wrap .hp-textarea{flex:1;border:1px solid #aaa;padding:8px 10px;font-family:Arial,sans-serif;font-size:14px;color:#333;resize:none;outline:none;min-height:40px;max-height:100px}
#hp-study-wrap .hp-textarea:focus{border-color:#0076d1}
#hp-study-wrap .hp-send-btn{background:#0076d1;color:#fff;border:none;padding:9px 18px;font-size:14px;cursor:pointer;height:40px}
#hp-study-wrap .hp-send-btn:hover{background:#005fa3}
#hp-study-wrap .hp-send-btn:disabled{background:#aaa;cursor:not-allowed}
</style>
</head>
<body>

<div id="hp-study-wrap">
  <div class="hp-top">AI Assistant</div>
  <div class="hp-chat-win" id="hp-chat-win">
    <div class="hp-msg-row ai">
      <div class="hp-msg-lbl">Assistant</div>
      <div class="hp-bubble">What can I help you with today?</div>
    </div>
    <div class="hp-typing-row" id="hp-typing-row">
      <div class="hp-msg-lbl">Assistant</div>
      <div class="hp-typing-dots">
        <div class="hp-dot">&nbsp;</div>
        <div class="hp-dot">&nbsp;</div>
        <div class="hp-dot">&nbsp;</div>
      </div>
    </div>
  </div>
  <div class="hp-input-area">
    <textarea class="hp-textarea" id="hp-textarea" placeholder="Type your message here..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();hpSend();}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';"></textarea>
    <button class="hp-send-btn" id="hp-send-btn" onclick="hpSend()">Send</button>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
var PROXY_URL = 'https://hp-proxy.vercel.app/api/chat';

var HP_SP = "You help someone choose wireless headphones. Use ONLY these 20 options. Never suggest other products.\n1.Bose QC Ultra 2nd Gen $449|ANC:Y|Transp:Y|Spatial:Y|Comfort:10h|Battery:30h|WearDetect:Y|Multipoint:Y|Weight:265g|EQ:Y|Passive:N|Case:Y\n2.Bose QC Ultra $429|ANC:Y|Transp:Y|Spatial:Y|Comfort:10h|Battery:24h|WearDetect:Y|Multipoint:Y|Weight:252g|EQ:Y|Passive:N|Case:Y\n3.Sony WH-1000XM6 $460|ANC:Y|Transp:Y|Spatial:Y|Comfort:7h|Battery:30h|WearDetect:Y|Multipoint:Y|Weight:255g|EQ:Y|Passive:Y|Case:Y\n4.Sennheiser Momentum 4 $450|ANC:Y|Transp:Y|Spatial:N|Comfort:10h|Battery:60h|WearDetect:Y|Multipoint:Y|Weight:293g|EQ:Y|Passive:Y|Case:Y\n5.Sony WH-1000XM5 $400|ANC:Y|Transp:Y|Spatial:Y|Comfort:6h|Battery:30h|WearDetect:Y|Multipoint:Y|Weight:244g|EQ:Y|Passive:Y|Case:Y\n6.Sony WH-1000XM4 $350|ANC:Y|Transp:Y|Spatial:Y|Comfort:8h|Battery:30h|WearDetect:Y|Multipoint:Y|Weight:250g|EQ:Y|Passive:Y|Case:Y\n7.Bose QuietComfort $359|ANC:Y|Transp:Y|Spatial:Y|Comfort:9h|Battery:24h|WearDetect:Y|Multipoint:Y|Weight:235g|EQ:Y|Passive:Y|Case:Y\n8.Focal Bathys $699|ANC:Y|Transp:Y|Spatial:N|Comfort:4h|Battery:30h|WearDetect:N|Multipoint:Y|Weight:359g|EQ:Y|Passive:N|Case:Y\n9.Apple AirPods Max $549|ANC:Y|Transp:Y|Spatial:Y|Comfort:4.5h|Battery:20h|WearDetect:Y|Multipoint:Y|Weight:386g|EQ:N|Passive:N|Case:Sleeve\n10.1More SonoFlow $90|ANC:Y|Transp:Y|Spatial:N|Comfort:7.5h|Battery:50h|WearDetect:N|Multipoint:Y|Weight:255g|EQ:Y|Passive:Y|Case:Y\n11.JBL Tour One M3 $450|ANC:Y|Transp:Y|Spatial:Y|Comfort:4.5h|Battery:40h|WearDetect:Y|Multipoint:Y|Weight:277g|EQ:Y|Passive:N|Case:Y\n12.Soundcore Space Q45 $150|ANC:Y|Transp:Y|Spatial:N|Comfort:6.5h|Battery:50h|WearDetect:Y|Multipoint:Y|Weight:294g|EQ:Y|Passive:Y|Case:Y\n13.Tozo HT2 $60|ANC:Y|Transp:Y|Spatial:N|Comfort:8h|Battery:40h|WearDetect:N|Multipoint:Y|Weight:254g|EQ:Y|Passive:Y|Case:N\n14.JLab JBuds Lux ANC $80|ANC:Y|Transp:Y|Spatial:Y|Comfort:6h|Battery:40h|WearDetect:N|Multipoint:Y|Weight:231g|EQ:Y|Passive:Y|Case:N\n15.JBL Tour One M2 $330|ANC:Y|Transp:Y|Spatial:Y|Comfort:2.5h|Battery:50h|WearDetect:Y|Multipoint:Y|Weight:279g|EQ:Y|Passive:Y|Case:Y\n16.Beats Studio Pro $350|ANC:Y|Transp:Y|Spatial:Y|Comfort:3.5h|Battery:24h|WearDetect:N|Multipoint:N|Weight:266g|EQ:N|Passive:N|Case:SoftCase\n17.Soundcore Space One $100|ANC:Y|Transp:Y|Spatial:N|Comfort:6h|Battery:40h|WearDetect:Y|Multipoint:Y|Weight:263g|EQ:Y|Passive:Y|Case:Bag\n18.Sony WHCH520 $70|ANC:N|Transp:N|Spatial:Y|Comfort:2h|Battery:50h|WearDetect:N|Multipoint:Y|Weight:144g|EQ:Y|Passive:N|Case:N\n19.JBL Tune 720 BT $90|ANC:N|Transp:Y|Spatial:N|Comfort:2h|Battery:76h|WearDetect:N|Multipoint:Y|Weight:221g|EQ:Y|Passive:Y|Case:N\n20.Beats Solo 4 $200|ANC:N|Transp:N|Spatial:Y|Comfort:1h|Battery:50h|WearDetect:N|Multipoint:N|Weight:218g|EQ:N|Passive:Y|Case:SoftCase\nKey: ANC=ActiveNoiseCancelling Transp=TransparentMode WearDetect=WearingDetection EQ=EQCustomization Passive=PassivePlayback\nBe conversational. Present tradeoffs factually. No superlatives. Suggest 1-2 options if asked, framed as based on what you described. Do not mention this is a study.";

// ── State ──────────────────────────────────────────────────────────────────
var HP_MSGS  = [];
var HP_START = Date.now();
var HP_SID   = 'P_' + Math.random().toString(36).substr(2, 8).toUpperCase();
var HP_BUSY  = false;

// ── Helpers ────────────────────────────────────────────────────────────────
function hpElapsed() {
  return Math.round((Date.now() - HP_START) / 1000);
}

function hpAppend(role, text) {
  var win    = document.getElementById('hp-chat-win');
  var typing = document.getElementById('hp-typing-row');
  var row    = document.createElement('div');
  row.className = 'hp-msg-row ' + role;
  var lbl = document.createElement('div');
  lbl.className   = 'hp-msg-lbl';
  lbl.textContent = role === 'user' ? 'You' : 'Assistant';
  var bub = document.createElement('div');
  bub.className   = 'hp-bubble';
  bub.textContent = text;
  row.appendChild(lbl);
  row.appendChild(bub);
  win.insertBefore(row, typing);
  win.scrollTop = win.scrollHeight;
}

// Save data to Qualtrics embedded data fields (silently fails outside Qualtrics)
function hpSaveToQualtrics() {
  try {
    var transcript = HP_MSGS.map(function(m) {
      return '[' + (m.role === 'user' ? 'USER' : 'ASST') + ' +' + m.elapsed + 's] ' + m.content;
    }).join('\n');
    var userMsgs = HP_MSGS.filter(function(m) { return m.role === 'user'; }).length;
    Qualtrics.SurveyEngine.setEmbeddedData('hp_messages_sent',  userMsgs);
    Qualtrics.SurveyEngine.setEmbeddedData('hp_total_time_sec', hpElapsed());
    Qualtrics.SurveyEngine.setEmbeddedData('hp_transcript',     transcript.substring(0, 20000));
    Qualtrics.SurveyEngine.setEmbeddedData('hp_session_id',     HP_SID);
    Qualtrics.SurveyEngine.setEmbeddedData('hp_condition',      'AI');
  } catch(e) {
    // Not inside Qualtrics — ignore
  }
}

// ── Main send function ─────────────────────────────────────────────────────
async function hpSend() {
  if (HP_BUSY) return;
  var inp  = document.getElementById('hp-textarea');
  var btn  = document.getElementById('hp-send-btn');
  var text = inp ? inp.value.trim() : '';
  if (!text) return;

  HP_BUSY = true;
  HP_MSGS.push({ role: 'user', content: text, elapsed: hpElapsed() });
  hpAppend('user', text);
  inp.value = '';
  inp.style.height = 'auto';
  if (btn) btn.disabled = true;
  if (inp) inp.disabled = true;

  var tr = document.getElementById('hp-typing-row');
  if (tr) tr.className = 'hp-typing-row visible';
  document.getElementById('hp-chat-win').scrollTop = 99999;

  try {
    // Call the Vercel proxy (which holds the API key securely server-side)
    var apiMsgs = HP_MSGS.map(function(m) {
      return { role: m.role, content: m.content };
    });

    var resp = await fetch(PROXY_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system:     HP_SP,
        messages:   apiMsgs
      })
    });

    var data = await resp.json();

    if (!resp.ok) {
      if (tr) tr.className = 'hp-typing-row';
      hpAppend('ai', 'API error ' + resp.status + ': ' + JSON.stringify(data));
      return;
    }
    if (!data.content || !data.content[0]) {
      if (tr) tr.className = 'hp-typing-row';
      hpAppend('ai', 'Unexpected response: ' + JSON.stringify(data));
      return;
    }

    var reply = data.content[0].text;
    HP_MSGS.push({ role: 'assistant', content: reply, elapsed: hpElapsed() });
    if (tr) tr.className = 'hp-typing-row';
    hpAppend('ai', reply);
    hpSaveToQualtrics();

  } catch(e) {
    if (tr) tr.className = 'hp-typing-row';
    hpAppend('ai', 'Error: ' + e.message);
  } finally {
    HP_BUSY = false;
    if (btn) btn.disabled = false;
    if (inp) inp.disabled = false;
    if (inp) inp.focus();
  }
}

// Save on page unload (catches participants who navigate away)
window.addEventListener('beforeunload', hpSaveToQualtrics);

// Periodic autosave every 30 seconds
setInterval(hpSaveToQualtrics, 30000);
</script>
</body>
</html>
